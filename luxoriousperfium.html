    <style>

        body{
            margin:0;
            
        }
        header{
            position:sticky;
            top:0;
            left:0;
            z-index:1;
            background-color:white;
            border-bottom: 3px solid black;

        }
        nav{
            display:flex;
            padding:20px;
        }
        .links,.img,.choices{
            flex-basis:33.333%;
        }
        .img{
            background-image:url('https://static.vecteezy.com/system/resources/previews/027/127/598/non_2x/chanel-logo-chanel-icon-transparent-free-png.png') ;
            height:45px;
            background-position: center center;
            background-size: contain;
            background-repeat: no-repeat;
        }
        .links{
            display:flex;
        }
        .links svg{
            flex-basis:50%;
            height:20px;
            margin:auto;
        }
        .choices{
            display:flex;
        }
        .choices svg{
            flex-basis:50%;
            height:20px;
            margin:auto;
        }
        .mid{
            background-image: url('https://i.pinimg.com/736x/af/3c/b5/af3cb50cec2b80f41ac063b5b33f651e.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            height:200px;
        }
        .textabove{
            width:100%;
            height:100%;
            color:white;
            margin:0;
            padding:0;
            position:relative;
        }
        .textabove h1{
            margin:0;
            padding:0;
            text-align: center;
            margin:auto auto;
            position:absolute;
            top:39%;
            right:17%;
            font-family: "Luxurious Script", cursive;
            font-weight: 400;
            font-style: normal;
        }
        #about_h{
            text-align:center;
            font-family: "Cinzel", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
        .example{
            display:flex;
        }
        .lefttext{
            flex-basis:50%;
            position:relative;
        }
        .rightimg{
            flex-basis:60%;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYNRXXHRVGMAlgTSnXg1Jy4aEFP-d89r6lMhecuDQldtCLLrHvyqe6osY&s=10');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            height:200px;
            margin: 0 1px 0 0px;
            border:3px solid black;
            padding:0;
            
        }
        p{
            font-family: "Cinzel", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            margin:22px 0 0 10px;
            
        }
        
        #collection{
            background-color: black;
            height:200px;
            margin:10px 0 0 0;
            color:white;
            height:100%;
        }
        #collection h2{
            text-align:center;
            font-family: "Cinzel", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
        .flexcollec{
            display:flex;
            flex-wrap: wrap;
        }
        article{
            flex-basis:50%;
            font-family: "Cinzel", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            margin:10px 0 0 0;
        }
        .prodimg{
            background-image: url('https://www.o2morny.com/cdn/shop/products/5_9f37ee0a-9b57-45d5-9c3f-2ce9333f5361.png?v=1756797017');
            height:140px;
            width:140px;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            margin:10px;
            text-align: center;
            margin:auto auto;
             
        }
        .title{
            text-align:center;
            font-family: "Cinzel", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            margin:auto auto;
        }
        .prodimg .title h3{
            margin:0;
            padding:0;
            margin:auto auto;
        }
        article a{
            text-decoration: none;
            color:white;
            border:1px solid white;
            padding:5px;
            display:block;
            text-align: center;
            width:150px;
            margin:10px auto 10px auto ;

                event.target.classList.add('delete');
                event.target.classList.remove('add')
            }else if(event.target.classList.contains('delete')){
                const sp = document.querySelector('span');
                const index = obj.indexOf(event.target.getAttribute('name'))
                obj.splice(index,1);
                sp.innerText=obj.length
                event.target.innerText='Add To Cart'
                event.target.classList.remove('delete');
                event.target.classList.add('add')
            }
        })

    </script>
</body>
</html>
